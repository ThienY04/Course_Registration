<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Courses</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 0 0 25px 25px;
        }

        .search-box {
            border-radius: 12px;
            overflow: hidden;
        }

        .course-card {
            border: none;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .course-img {
            height: 180px;
            object-fit: cover;
        }

        .badge-category {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 20px;
        }

        .btn-enroll {
            border-radius: 10px;
            font-weight: 600;
        }

        .pagination .page-link {
            border-radius: 10px;
        }

        .topbar {
            background: #343a40;
            height: 50px;

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            display: flex;
            justify-content: flex-end;
            align-items: center;

            padding: 0 20px;
            z-index: 999;
        }

        .header {
            margin-top: 50px;
        }

        body {
            padding-top: 50px;
        }
    </style>
</head>

<body>

    <div class="header py-5 text-center shadow-sm">
        <h2 class="fw-bold">📚 Course Registration</h2>
        <p>Khám phá và đăng ký học phần dễ dàng</p>
    </div>

    <div class="container py-4">
        <div class="topbar d-flex justify-content-end align-items-center px-4">
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn btn-light btn-sm">Login</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">

                <span class="me-3 text-white fw-bold">
                    👤 <span sec:authentication="name"></span>
                </span>

                <span class="badge bg-warning text-dark me-2" sec:authorize="hasRole('ADMIN')">
                    ADMIN
                </span>

                <form th:action="@{/logout}" method="post" class="ms-2">
                    <button class="btn btn-danger btn-sm">Logout</button>
                </form>

            </div>

        </div>
        <div class="card shadow-sm p-3 mb-4 search-box">
            <form th:action="@{/home}" method="get" class="row g-2">
                <div class="col-md-10">
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm khóa học..."
                            class="form-control border-start-0">
                    </div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100 shadow-sm">
                        Tìm kiếm
                    </button>
                </div>
            </form>
        </div>
        <div class="row">
            <div class="col-lg-4 col-md-6 mb-4" th:each="course : ${courses}">
                <div class="card course-card shadow-sm h-100">
                    <div class="position-relative">
                        <img th:src="${course.image != null} 
                    ? @{'/images/' + ${course.image}} 
                    : @{'/images/default.jpg'}" class="card-img-top course-img" alt="image">
                        <span class="position-absolute top-0 end-0 m-2 badge badge-category"
                            th:text="${course.category != null ? course.category.name : 'No Category'}">
                        </span>

                    </div>
                    <div class="card-body d-flex flex-column">

                        <h5 class="fw-bold" th:text="${course.name}"></h5>

                        <p class="text-muted small mb-2">
                            <i class="bi bi-person"></i>
                            <span th:text="${course.lecturer}"></span>
                        </p>

                        <p class="fw-bold text-primary mb-3">
                            <i class="bi bi-book"></i>
                            [[${course.credits}]] tín chỉ
                        </p>
                        <div class="mt-auto">
                            <a th:href="@{'/enroll/' + ${course.id}}" class="btn btn-success btn-enroll w-100">
                                <i class="bi bi-plus-circle"></i> Đăng ký
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <nav th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/home(page=${currentPage-1}, keyword=${keyword})}">
                        ←
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                    th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/home(page=${i}, keyword=${keyword})}" th:text="${i+1}">
                    </a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages-1} ? 'disabled'">
                    <a class="page-link" th:href="@{/home(page=${currentPage+1}, keyword=${keyword})}">
                        →
                    </a>
                </li>

            </ul>
        </nav>

    </div>

</body>

</html>
